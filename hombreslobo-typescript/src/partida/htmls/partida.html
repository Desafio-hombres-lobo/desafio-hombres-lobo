<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Partida - Castronegro</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bahiana&family=Inter:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <header class="cabecera">
      <div class="nav-logo-titulo">
        <h1 class="titulo-sitio">Castronegro</h1>
      </div>
      <div class="info-estado">
        <span class="dato-partida" id="reloj-partida"
          ><i class="fas fa-clock"></i> --:--</span
        >
        <span class="dato-partida" id="fase-partida">FASE: DÍA</span>
      </div>
      <nav class="menu">
        <a href="/index.html" class="boton-salir">Abandonar</a>
      </nav>
    </header>

    <main class="pantalla-juego">
      <section class="contenedor-mesa tarjeta-estilo">
        <div class="grid-tablero">
          <div class="centro-info">
            <h2></h2>
            <p id="texto-espera">Esperando a los jugadores...</p>
            <button id="btn-iniciar" class="boton-principal oculto">
              EMPEZAR PARTIDA
            </button>
            <button class="boton-principal oculto" id="btn-niña">
              Escuchar a los lobos
            </button>
          </div>

          <!-- GENERAR DINÁMICAMENTE LAS CARTAS COMO ESTOS DIVS -->
          <!-- <div class="jugador slot-1"><span>J1</span></div>
          <div class="jugador slot-18"><span>J18</span></div> -->
        </div>
      </section>

      <section class="contenedor-chat tarjeta-estilo">
        <div class="chat-header">
          <h3 id="h3-chat"></h3>
        </div>

        <div class="chat-mensajes" id="lista-mensajes"></div>

        <form class="chat-input-area" id="form-chat">
          <input
            type="text"
            placeholder="Escribe aquí..."
            autocomplete="off"
            id="input-mensaje"
          />
          <button type="submit" id="btn-enviar">
            <i class="fas fa-paper-plane"></i>
          </button>
        </form>
      </section>
    </main>
    <div class="resultado" id="resultado">
      <p id="texto-votacion"></p>
    </div>

    <script type="module" src="../ts/chatAldea.ts"></script>
  </body>
</html>

name: Vite Build

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev]

jobs:
  vite-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: hombreslobo-typescript

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install Dependencies
      run: npm install

    - name: Build Vite
      run: npm run build

version: "3.9"

services:
  laravel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_app
    ports:
      - "${LARAVEL_PORT}:8000"
    volumes:
      - ./hombresLoboLaravel:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DB_CONNECTION=${DB_CONNECTION}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    command: php artisan serve --host=0.0.0.0 --port=8000

  mysql:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: devuser
      MYSQL_PASSWORD: devpass
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - db_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --skip-ssl
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 15

  frontend:
    image: node:20
    container_name: ts_frontend
    working_dir: /app
    ports:
      - "${FRONT_PORT}:5173"
    volumes:
      - ./hombreslobo-typescript:/app
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - laravel

volumes:
  db_data:

